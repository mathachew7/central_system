services:
  - type: web
    name: central-system-api
    runtime: node
    plan: free
    buildCommand: npm install --production=false && npm run build
    startCommand: npm run start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: LOG_LEVEL
        value: info
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: RATE_LIMIT_MAX
        value: 120
      - key: ADMIN_API_KEY
        generateValue: true
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: central-system-frontend
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: central-system-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: central-system-api
          envVarKey: RENDER_EXTERNAL_URL
